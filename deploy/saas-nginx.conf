# ================================================================
# 英文版 EGP-IMS — mipham.ai (国际独立部署)
# 独立 Nginx server block
# ================================================================

server {
    listen 80;
    server_name mipham.ai www.mipham.ai;

    # SSL 证书（Let's Encrypt 自动续期后启用）
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/mipham.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mipham.ai/privkey.pem;

    root /opt/egp-ims/saas/frontend;
    index index.html;

    # 前端 SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # CORS headers for cross-origin (if needed)
        add_header Access-Control-Allow-Origin *;
    }
}

# ================================================================
# 部署步骤：
# 1. 上传 dist-saas/ → 服务器 /opt/egp-ims/saas/frontend/
# 2. 上传后端代码 → 服务器 /opt/egp-ims/saas/backend/
# 3. 将此 nginx 配置复制到 /etc/nginx/sites-available/mipham.ai
# 4. 创建 symlink: ln -s /etc/nginx/sites-available/mipham.ai /etc/nginx/sites-enabled/
# 5. 获取 SSL 证书: certbot --nginx -d mipham.ai -d www.mipham.ai
# 6. 后端服务启动:
#    cd /opt/egp-ims/saas/backend
#    DATABASE_URL=sqlite:////opt/egp-ims/saas/data/finance.db \
#      uvicorn app.main:app --host 127.0.0.1 --port 8002
# 7. 重启 nginx: systemctl reload nginx
# ================================================================
