# ================================================================
# 中文版 EGP-IMS — rismedronxin.com/intranet
# 部署于腾讯云轻量服务器，与利美融信资本官网共享 Nginx
# 将此文件 include 到官网的 server block 中
# ================================================================

# 前端静态资源
location /intranet {
    alias /opt/egp-ims/intranet/frontend;
    index index.html;
    try_files $uri $uri/ /intranet/index.html;
}

# 后端 API 代理
location /intranet/api/ {
    proxy_pass http://127.0.0.1:8001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# ================================================================
# 部署步骤：
# 1. 上传 dist-intranet/ → 服务器 /opt/egp-ims/intranet/frontend/
# 2. 上传后端代码 → 服务器 /opt/egp-ims/intranet/backend/
# 3. 将此 nginx 配置 include 到官网 server block
# 4. 后端服务启动:
#    cd /opt/egp-ims/intranet/backend
#    DATABASE_URL=sqlite:////opt/egp-ims/intranet/data/finance.db \
#      uvicorn app.main:app --host 127.0.0.1 --port 8001
# 5. 重启 nginx: systemctl reload nginx
# ================================================================
